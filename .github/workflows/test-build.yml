name: Test Build (No Signing)

# Test build workflow without code signing
# Runs on every push to main to ensure builds don't break

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup OpenClaw vendor
        shell: bash
        run: ./scripts/setup-vendor.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Test Windows build (no signing)
        run: |
          cd apps/desktop
          pnpm run pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

  test-build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup OpenClaw vendor
        run: ./scripts/setup-vendor.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Test macOS build (no signing)
        run: |
          cd apps/desktop
          pnpm run pack:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Validate macOS bundle
        run: |
          APP=$(find apps/desktop/release -name "*.app" -maxdepth 3 | head -1)
          VENDOR="$APP/Contents/Resources/vendor/openclaw"
          test -f "$VENDOR/vendor-runtime.tar.gz" || { echo "FAIL: archive missing"; exit 1; }
          test ! -d "$VENDOR/node_modules" || { echo "FAIL: exploded node_modules in bundle"; exit 1; }
          FILE_COUNT=$(find "$VENDOR" -type f | wc -l)
          echo "Vendor dir: $FILE_COUNT files"
          test "$FILE_COUNT" -le 10 || { echo "FAIL: >10 files in vendor dir"; exit 1; }
          echo "PASS"
